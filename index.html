
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D.A.N.N.A. — Motor de Análisis Probabilístico</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg-deep: #05070a; --bg-card: #0f172a; --neon: #00ff88; --gold: #ffd700; --gold-dim: #b8960f; --text-primary: #f8fafc; --border: rgba(255,255,255,0.08); }
    body { background-color: var(--bg-deep); color: var(--text-primary); font-family: 'Montserrat', sans-serif; line-height: 1.6; overflow-x: hidden; scroll-behavior: smooth; }
    .gold-text { background: linear-gradient(90deg, #ffd700, #fff7ad, #b8960f); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    
    /* MODIFICADO: Contenido visible por defecto para evitar que se quede negro */
    .fade-in { opacity: 1 !important; transform: none !important; }
    
    .card-blur { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 24px; }
    .tab-btn { background: transparent; border: none; color: #475569; font-weight: 700; font-size: 0.8rem; letter-spacing: 0.15em; padding: 1rem; cursor: pointer; transition: all 0.3s; border-bottom: 2px solid transparent; width: 50%; }
    .tab-btn.active { color: var(--gold); border-bottom: 2px solid var(--gold); }
    .tab-content { display: none; padding-top: 1rem; }
    .tab-content.active { display: block; }
    input[type="text"], input[type="password"], input[type="email"] { background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; color: white; width: 100%; margin-bottom: 1rem; outline: none; }
    input:focus { border-color: var(--gold); }
    button { cursor: pointer; border-radius: 12px; padding: 1rem; width: 100%; text-transform: uppercase; font-weight: 900; letter-spacing: 0.1em; transition: all 0.3s; }
    #login-form button { background: var(--gold); color: black; border: none; }
    #register-form button { background: transparent; border: 2px solid var(--gold); color: var(--gold); }
    #register-form button:hover { background: var(--gold); color: black; }
</style>
</head>
<body>

<div class="bg-red-600/10 border-b border-red-500/20 py-2 text-center text-[10px] md:text-xs font-bold tracking-widest text-red-500 uppercase">
    ⚠️ ALERTA: Solo quedan <span id="fomo-counter">14</span> licencias Beta disponibles.
</div>

<header class="pt-20 pb-16 px-6 text-center max-w-5xl mx-auto">
    <div class="text-xs uppercase tracking-[0.3em] gold-text mb-2 font-bold">MOTOR DE ANALISIS PROBABILISTICO v1.0</div>
    <h1 class="text-7xl md:text-[8rem] font-black mb-2 tracking-tighter gold-text leading-none">D.A.N.N.A</h1>
    <h2 class="text-4xl md:text-6xl font-black mb-6 tracking-tighter text-white leading-tight">No es Azar. <br><span class="text-gray-400">Es Ingeniería.</span></h2>
    <p class="text-gray-300 text-lg md:text-xl max-w-3xl mx-auto mb-10 font-medium">Análisis de patrones en tiempo real para sectores de alta frecuencia.</p>
    <div class="mb-16"><a href="#auth-section" class="inline-block bg-yellow-500 text-black font-black px-12 py-4 rounded-xl uppercase tracking-widest hover:bg-white transition">SOLICITAR ACCESO →</a></div>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 max-w-5xl mx-auto">
        <div class="card-blur p-6"><div class="text-3xl font-bold gold-text mono">954</div><div class="text-[10px] text-gray-500 uppercase font-bold mt-2">Patrones</div></div>
        <div class="card-blur p-6"><div class="text-3xl font-bold text-emerald-400 mono">68.1%</div><div class="text-[10px] text-gray-500 uppercase font-bold mt-2">Hit Rate</div></div>
        <div class="card-blur p-6"><div class="text-3xl font-bold text-blue-400 mono">8,151</div><div class="text-[10px] text-gray-500 uppercase font-bold mt-2">Spins</div></div>
        <div class="card-blur p-6"><div class="text-3xl font-bold text-purple-400 mono">4</div><div class="text-[10px] text-gray-500 uppercase font-bold mt-2">Modelos ML</div></div>
    </div>
</header>

<section id="auth-section" class="py-20 px-6 max-w-3xl mx-auto text-center">
    <div class="card-blur p-8 md:p-12 text-left max-w-md mx-auto shadow-2xl border-yellow-500/20">
        <div class="flex border-b border-white/10 mb-8">
            <button class="tab-btn active" id="tab-login" onclick="showTab('login')">INGRESAR</button>
            <button class="tab-btn" id="tab-register" onclick="showTab('register')">REGISTRO</button>
        </div>
        
        <div id="content-login" class="tab-content active">
            <form id="login-form">
                <input type="text" id="login-username" placeholder="NOMBRE DE USUARIO" required>
                <input type="password" id="login-password" placeholder="CONTRASEÑA" required>
                <button type="submit">Desplegar Interfaz</button>
            </form>
        </div>
        
        <div id="content-register" class="tab-content">
            <form id="register-form">
                <input type="text" id="reg-username" placeholder="NUEVO USUARIO" required>
                <input type="email" id="reg-email" placeholder="CORREO" required>
                <input type="password" id="reg-password" placeholder="CONTRASEÑA" required>
                <button type="submit" id="reg-btn">CREAR CUENTA</button>
                <p id="reg-msg" class="text-[10px] mt-4 text-center hidden"></p>
            </form>
        </div>
    </div>
</section>

<script>
    const RAILWAY_URL = "https://api.dannaengine.com";

    function showTab(type) { 
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); 
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active')); 
        document.getElementById('tab-' + type).classList.add('active'); 
        document.getElementById('content-' + type).classList.add('active');
    }

    document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('reg-btn');
        const msgEl = document.getElementById('reg-msg');
        btn.disabled = true;
        btn.textContent = 'PROCESANDO...';

        try {
            const res = await fetch(`${RAILWAY_URL}/api/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    username: document.getElementById('reg-username').value, 
                    password: document.getElementById('reg-password').value,
                    email: document.getElementById('reg-email').value 
                })
            });
            const data = await res.json();
            msgEl.classList.remove('hidden');
            msgEl.className = data.success ? 'text-emerald-400 text-center mt-4' : 'text-red-500 text-center mt-4';
            msgEl.textContent = data.message;
        } catch (err) {
            msgEl.classList.remove('hidden');
            msgEl.className = 'text-red-500 text-center mt-4';
            msgEl.textContent = 'Error de conexión.';
        }
        btn.disabled = false;
        btn.textContent = 'CREAR CUENTA';
    });
</script>
</body>
</html>
